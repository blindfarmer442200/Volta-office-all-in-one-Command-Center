name: Red team

on:
  push:
    branches: [main]
  pull_request:

jobs:
  redteam:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run red-team probe suite
        run: PYTHONPATH=src:. python -m bella_harness.cli redteam --report redteam-report.json

      - name: Upload red-team report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-report-py${{ matrix.python-version }}
          path: redteam-report.json
